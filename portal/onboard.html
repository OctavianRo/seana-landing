<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>List Your Sauna — seána</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" href="/favicon.png" sizes="32x32">
  <link rel="apple-touch-icon" href="/favicon.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0F1114;
      --border: rgba(200,120,90,0.12);
      --border-focus: rgba(200,120,90,0.5);
      --orange: #C8785A;
      --text: #F0ECE6;
      --text2: rgba(240,236,230,0.6);
      --text3: rgba(240,236,230,0.35);
      --radius: 14px;
      --radius-sm: 10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
    }

    /* Animated shader background — matches the landing page */
    #shader-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      opacity: 0.35;
      pointer-events: none;
    }
    #shader-bg canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    /* Keep page content above the shader */
    nav, .page { position: relative; z-index: 1; }

    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 24px; border-bottom: 1px solid var(--border);
    }
    .nav-brand {
      display: flex; align-items: center; gap: 10px;
      font-size: 18px; font-weight: 800; color: var(--text);
      text-decoration: none;
    }

    .page { max-width: 480px; margin: 0 auto; padding: 52px 24px 80px; }

    h1 { font-size: 30px; font-weight: 800; color: var(--text); margin-bottom: 10px; }
    .subtitle { font-size: 16px; color: var(--text3); line-height: 1.6; margin-bottom: 36px; }

    .field { margin-bottom: 20px; }
    .field label {
      display: block; font-size: 12px; font-weight: 600;
      color: var(--text2); letter-spacing: 0.4px; margin-bottom: 8px;
    }
    input[type=text], input[type=email], input[type=tel] {
      width: 100%; background: #12151A; border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 14px 16px;
      color: var(--text); font-size: 16px; outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--border-focus); }

    .btn {
      width: 100%; background: var(--orange); color: #0F1114;
      border: none; border-radius: var(--radius); padding: 16px;
      font-size: 16px; font-weight: 800; cursor: pointer;
      margin-top: 8px; transition: opacity 0.2s;
    }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .btn:not(:disabled):hover { opacity: 0.88; }

    .success {
      display: none; text-align: center; padding-top: 60px;
    }
    .success-icon { font-size: 48px; margin-bottom: 20px; }
    .success h2 { font-size: 26px; font-weight: 800; margin-bottom: 12px; }
    .success p { font-size: 16px; color: var(--text2); line-height: 1.6; }
  </style>
</head>
<body>

  <!-- Three.js shader background (fixed, behind entire page) -->
  <div id="shader-bg"></div>

  <nav>
    <a href="/" class="nav-brand">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#C8785A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>
      </svg>
      seána
    </a>
  </nav>

  <div class="page">

    <div id="form-view">
      <h1>Get listed on seána</h1>
      <p class="subtitle">Drop your details and I'll be in touch to get your sauna live.</p>

      <form id="listing-form" action="https://formspree.io/f/mojpjvwb" method="POST">
        <input type="hidden" name="_subject" value="New seána listing request" />
        <div class="field">
          <label>Sauna name *</label>
          <input type="text" name="Sauna Name" id="saunaName" placeholder="Your sauna name" autocomplete="organization" required />
        </div>
        <div class="field">
          <label>Email address *</label>
          <input type="email" name="email" id="email" placeholder="you@yoursauna.ie" autocomplete="email" required />
        </div>
        <div class="field">
          <label>Phone number</label>
          <input type="tel" name="Phone" id="phone" placeholder="+353 ..." autocomplete="tel" />
        </div>
        <button class="btn" id="submit-btn" type="submit">Get Listed</button>
      </form>
    </div>

    <div class="success" id="success-view">
      <div class="success-icon">🔥</div>
      <h2>You're on the list!</h2>
      <p>Thanks for registering. I'll be in touch shortly to get your sauna live on seána.</p>
    </div>

  </div>

  <!-- Three.js for shader animation (same as landing page) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    (function() {
      var container = document.getElementById('shader-bg');
      if (!container || typeof THREE === 'undefined') return;

      var vertexShader = 'void main(){gl_Position=vec4(position,1.0);}';

      var fragmentShader = [
        'precision highp float;',
        'uniform vec2 resolution;',
        'uniform float time;',
        '',
        'void main(void){',
        '  vec2 uv=(gl_FragCoord.xy*2.0-resolution.xy)/min(resolution.x,resolution.y);',
        '  float t=time*0.05;',
        '  float lw=0.003;',
        '',
        '  vec3 tint1=vec3(0.78,0.47,0.35);',
        '  vec3 tint2=vec3(0.83,0.58,0.43);',
        '  vec3 tint3=vec3(0.72,0.40,0.28);',
        '',
        '  float v1=0.0;',
        '  for(int i=0;i<6;i++){',
        '    v1+=lw*float(i*i)/abs(fract(t+float(i)*0.012)*4.0-length(uv)+mod(uv.x+uv.y,0.2));',
        '  }',
        '',
        '  float v2=0.0;',
        '  for(int i=0;i<5;i++){',
        '    v2+=lw*float(i*i)/abs(fract(t+0.333+float(i)*0.015)*4.0-length(uv*1.05)+mod(uv.x-uv.y,0.22));',
        '  }',
        '',
        '  float v3=0.0;',
        '  for(int i=0;i<5;i++){',
        '    v3+=lw*float(i*i)/abs(fract(t+0.666+float(i)*0.01)*4.0-length(uv*0.95)+mod(uv.x+uv.y*0.5,0.18));',
        '  }',
        '',
        '  float glow=0.06/(0.4+length(uv)*length(uv));',
        '',
        '  vec3 col=tint1*v1 + tint2*v2*0.7 + tint3*v3*0.5 + tint1*glow;',
        '  gl_FragColor=vec4(col,1.0);',
        '}'
      ].join('\n');

      var camera = new THREE.Camera();
      camera.position.z = 1;
      var scene = new THREE.Scene();
      var geo = new THREE.PlaneGeometry(2, 2);
      var uniforms = {
        time: { type: 'f', value: 1.0 },
        resolution: { type: 'v2', value: new THREE.Vector2() }
      };
      var mat = new THREE.ShaderMaterial({
        uniforms: uniforms,
        vertexShader: vertexShader,
        fragmentShader: fragmentShader
      });
      scene.add(new THREE.Mesh(geo, mat));

      var renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      container.appendChild(renderer.domElement);

      function resize() {
        var w = container.clientWidth;
        var h = container.clientHeight;
        renderer.setSize(w, h);
        uniforms.resolution.value.x = renderer.domElement.width;
        uniforms.resolution.value.y = renderer.domElement.height;
      }
      resize();
      window.addEventListener('resize', resize);

      function animate() {
        requestAnimationFrame(animate);
        uniforms.time.value += 0.05;
        renderer.render(scene, camera);
      }
      animate();
    })();
  </script>

  <script>
    const form = document.getElementById('listing-form');
    const btn = document.getElementById('submit-btn');

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      btn.disabled = true;
      btn.textContent = 'Sending...';
      try {
        const data = new FormData(form);
        const res = await fetch('https://formspree.io/f/mojpjvwb', {
          method: 'POST',
          headers: { 'Accept': 'application/json' },
          body: data,
        });
        if (!res.ok) throw new Error(`Formspree error ${res.status}`);
        document.getElementById('form-view').style.display = 'none';
        document.getElementById('success-view').style.display = 'block';
      } catch (err) {
        console.error(err);
        btn.disabled = false;
        btn.textContent = 'Get Listed';
        alert('Something went wrong — please try again or email octavian.rosca7@gmail.com directly.');
      }
    });
  </script>

</body>
</html>
